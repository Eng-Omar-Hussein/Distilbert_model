apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-model-api
  labels:
    app: ai-model
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-model
  template:
    metadata:
      labels:
        app: ai-model
    spec:
      volumes:
        - name: model-volume
          hostPath:
            # Change this to the exact absolute path on your local machine/WSL
            path: /tmp/saved_distilbert_model
            # This tells K8s to create the folder on your machine if it's missing
            type: DirectoryOrCreate

      initContainers:
        - name: download-model
          image: python:3.12-slim
          command:
            - sh
            - -c
            - |
              cd /model

              if [ -f "model.onnx" ]; then
                echo "Model already exists in /model. Skipping download!"
                exit 0
              fi
              
              apt-get update && apt-get install -y unzip 
              pip install --no-cache-dir gdown 
              gdown "https://drive.google.com/file/d/1152xEhIRVnQry9e1Idp0cOA4Y6Z52klS/view?usp=drive_link"
              unzip *.zip
              pwd
              ls -la
              whoami
              mv content/drive/MyDrive/Roberta/DistilBERT/model/* .
              rm -rf content
              rm *.zip
              chmod -R a+r /model

          volumeMounts:
            - name: model-volume
              mountPath: /model

      containers:
        - name: api
          image: omarhussein2111/ai-model-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000

          volumeMounts:
            - name: model-volume
              mountPath: /app/model

          env:
            - name: MODEL_DIR
              value: /app/model

          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: ai-model-service
spec:
  type: NodePort
  selector:
    app: ai-model
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
      nodePort: 30006
