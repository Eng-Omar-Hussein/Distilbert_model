apiVersion: v1
kind: Namespace
metadata:
  name: model-api
  labels:
    name: model-api
    environment: development

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-model-api
  labels:
    app: ai-model
  namespace: model-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-model
  template:
    metadata:
      labels:
        app: ai-model
    spec:
      volumes:
        - name: model-volume
          hostPath:
            # Change this to the exact absolute path on your local machine/WSL
            path: /tmp/saved_distilbert_model
            # This tells K8s to create the folder on your machine if it's missing
            type: DirectoryOrCreate

      initContainers:
        - name: download-model
          image: python:3.12-slim
          command:
            - sh
            - -c
            - |
              ls -la
              pwd
              cd /model

              if [ -f "model.onnx" ]; then
                echo "Model already exists in /model. Skipping download!"
                exit 0
              fi
              
              apt-get update && apt-get install -y unzip 
              pip install --no-cache-dir gdown 
              gdown "https://drive.google.com/file/d/16yGOF0--kL3etijg-UflSbnzxpMT7Wof/view?usp=drive_link"
              unzip *.zip
              pwd
              whoami
              mv content/drive/MyDrive/Roberta/DistilBERT/model/* .
              ls -la
              rm -rf content
              rm *.zip
              chmod -R a+r /model

          volumeMounts:
            - name: model-volume
              mountPath: /model

      containers:
        - name: api
          image: omarhussein2111/ai-model-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000

          volumeMounts:
            - name: model-volume
              mountPath: /app/model

          env:
            - name: MODEL_DIR
              value: /app/model

          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: ai-model-service
  namespace: model-api
spec:
  type: NodePort
  selector:
    app: ai-model
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
      nodePort: 30006
